---
# Builds the "testing" image stream (previously known as "latest").
#
# Tag scheme (mirrors Bluefin, see https://docs.projectbluefin.io/blog/unifying-bluefin/):
#   testing             - every build from the current Fedora release
#   NN.YYYYMMDD[.B]     - timestamp tag (NN = Fedora version, B = build number for same-day rebuilds)
#
# Triggers on every push to main so users always have an up-to-date testing image.
#
# Image variants built per stream:
#   bluefin-br              - base image (Silverblue + BR customisations)
#   bluefin-br-dx           - developer experience variant
#   bluefin-br-nvidia       - NVIDIA proprietary drivers variant
#   bluefin-br-dx-nvidia    - DX + NVIDIA proprietary drivers variant
#   bluefin-br-nvidia-open  - NVIDIA open drivers variant
#   bluefin-br-dx-nvidia-open - DX + NVIDIA open drivers variant
#
name: Build testing image
on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/README.md"
      - ".github/workflows/*validate*.yml"
  schedule:
    - cron: '0 3 * * *'    # 03:00 UTC daily
  push:
    branches:
      - main
    paths-ignore:
      - "**/README.md"
  workflow_dispatch:

env:
  IMAGE_KEYWORDS: "bootc,ublue,universal-blue,bluefin,brasil,pt-br,testing"
  IMAGE_LOGO_URL: "https://avatars.githubusercontent.com/u/120078124?s=200&v=4"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  BASE_IMAGE_NAME_ROOT: "${{ github.event.repository.name }}"
  DEFAULT_TAG: "testing"

jobs:
  build_push:
    name: Build and push image (${{ matrix.image_name_suffix != '' && matrix.image_name_suffix || 'base' }})
    runs-on: ubuntu-24.04
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-${{ matrix.image_flavor }}-${{ matrix.base_image_name }}-${{ matrix.image_name_suffix }}
      cancel-in-progress: true

    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image_flavor: main
            base_image_name: silverblue
            image_versions_key: silverblue-main
            akmods_versions_key: ""
            containerfile: "Containerfile"
            image_name_suffix: ""
            image_desc: "Bluefin para o Brasil (testing)"
          - image_flavor: dx
            base_image_name: silverblue
            image_versions_key: silverblue-main
            akmods_versions_key: ""
            containerfile: "Containerfile"
            image_name_suffix: "-dx"
            image_desc: "Bluefin para o Brasil (developer experience, testing)"
          - image_flavor: main
            base_image_name: silverblue
            image_versions_key: silverblue-main
            akmods_versions_key: "akmods-nvidia-lts-main"
            akmods_addons_versions_key: "akmods-main"
            containerfile: "Containerfile.nvidia"
            image_name_suffix: "-nvidia"
            image_desc: "Bluefin para o Brasil (NVIDIA proprietário, testing)"
          - image_flavor: dx
            base_image_name: silverblue
            image_versions_key: silverblue-main
            akmods_versions_key: "akmods-nvidia-lts-main"
            akmods_addons_versions_key: "akmods-main"
            containerfile: "Containerfile.nvidia"
            image_name_suffix: "-dx-nvidia"
            image_desc: "Bluefin para o Brasil (developer experience + NVIDIA proprietário, testing)"
          - image_flavor: main
            base_image_name: silverblue
            image_versions_key: silverblue-main
            akmods_versions_key: "akmods-nvidia-open-main"
            akmods_addons_versions_key: "akmods-main"
            containerfile: "Containerfile.nvidia-open"
            image_name_suffix: "-nvidia-open"
            image_desc: "Bluefin para o Brasil (NVIDIA open, testing)"
          - image_flavor: dx
            base_image_name: silverblue
            image_versions_key: silverblue-main
            akmods_versions_key: "akmods-nvidia-open-main"
            akmods_addons_versions_key: "akmods-main"
            containerfile: "Containerfile.nvidia-open"
            image_name_suffix: "-dx-nvidia-open"
            image_desc: "Bluefin para o Brasil (developer experience + NVIDIA open, testing)"

    steps:
      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${BASE_IMAGE_NAME_ROOT,,}${{ matrix.image_name_suffix }}" >> ${GITHUB_ENV}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Mount BTRFS for podman storage
        id: container-storage-action
        uses: ublue-os/container-storage-action@911baca08baf30c8654933e9e9723cb399892140 # main
        continue-on-error: true
        with:
          target-dir: /var/lib/containers
          mount-opts: compress-force=zstd:2

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Read image versions
        run: |
          BASE_IMAGE_DIGEST=$(yq -r '.images[] | select(.name == "${{ matrix.image_versions_key }}") | .digest' image-versions.yml)
          COMMON_IMAGE_DIGEST=$(yq -r '.images[] | select(.name == "common") | .digest' image-versions.yml)
          BREW_IMAGE_DIGEST=$(yq -r '.images[] | select(.name == "brew") | .digest' image-versions.yml)

          # Resolve the real Fedora major version from the base image OCI labels,
          # following the same pattern as upstream Bluefin (skopeo inspect + jq).
          # The tag in image-versions.yml may be "latest" or "next" (a stream name),
          # not the numeric Fedora version needed for timestamp tags.
          IMAGE_TAG=$(yq -r '.images[] | select(.name == "${{ matrix.image_versions_key }}") | .tag' image-versions.yml)
          if [[ "${IMAGE_TAG}" =~ ^[0-9]+$ ]]; then
            FEDORA_MAJOR_VERSION="${IMAGE_TAG}"
          else
            FEDORA_MAJOR_VERSION=$(skopeo inspect --retry-times 3 \
              "docker://ghcr.io/ublue-os/${{ matrix.base_image_name }}-main@${BASE_IMAGE_DIGEST}" \
              | jq -r '.Labels["org.opencontainers.image.version"]' \
              | grep -oP '^[0-9]+')
          fi

          if [ -z "${FEDORA_MAJOR_VERSION}" ]; then
            echo "::error::Failed to resolve Fedora major version from base image labels"
            exit 1
          fi

          echo "BASE_IMAGE_DIGEST=${BASE_IMAGE_DIGEST}" >> $GITHUB_ENV
          echo "COMMON_IMAGE_DIGEST=${COMMON_IMAGE_DIGEST}" >> $GITHUB_ENV
          echo "BREW_IMAGE_DIGEST=${BREW_IMAGE_DIGEST}" >> $GITHUB_ENV
          echo "FEDORA_MAJOR_VERSION=${FEDORA_MAJOR_VERSION}" >> $GITHUB_ENV
          if [ -n "${{ matrix.akmods_versions_key }}" ]; then
            if [ -n "${{ matrix.akmods_addons_versions_key }}" ]; then
              AKMODS_TAG=$(yq -r '.images[] | select(.name == "${{ matrix.akmods_addons_versions_key }}") | .tag' image-versions.yml)
              AKMODS_DIGEST=$(yq -r '.images[] | select(.name == "${{ matrix.akmods_addons_versions_key }}") | .digest' image-versions.yml)
              echo "AKMODS_TAG=${AKMODS_TAG}" >> $GITHUB_ENV
              echo "AKMODS_DIGEST=${AKMODS_DIGEST}" >> $GITHUB_ENV
            fi
            AKMODS_NVIDIA_TAG=$(yq -r '.images[] | select(.name == "${{ matrix.akmods_versions_key }}") | .tag' image-versions.yml)
            AKMODS_NVIDIA_DIGEST=$(yq -r '.images[] | select(.name == "${{ matrix.akmods_versions_key }}") | .digest' image-versions.yml)
            echo "AKMODS_NVIDIA_TAG=${AKMODS_NVIDIA_TAG}" >> $GITHUB_ENV
            echo "AKMODS_NVIDIA_DIGEST=${AKMODS_NVIDIA_DIGEST}" >> $GITHUB_ENV
          fi

      - name: Determine timestamp tag
        run: |
          # Build the base version tag: NN.YYYYMMDD
          BASE_VER="${FEDORA_MAJOR_VERSION}.$(date -u +%Y%m%d)"

          # Query existing tags from the registry to compute the build number,
          # following the same pattern as upstream Bluefin (skopeo list-tags + point release).
          # If the base version already exists, append .1, .2, etc.
          REPO="${IMAGE_REGISTRY}/${IMAGE_NAME}"
          if skopeo list-tags "docker://${REPO}" > /tmp/repotags.json 2>/dev/null; then
            if [[ $(jq "any(.Tags[]; contains(\"${BASE_VER}\"))" < /tmp/repotags.json) == "true" ]]; then
              POINT=1
              while jq -e "any(.Tags[]; contains(\"${BASE_VER}.${POINT}\"))" < /tmp/repotags.json > /dev/null 2>&1; do
                (( POINT++ ))
              done
              TIMESTAMP_TAG="${BASE_VER}.${POINT}"
            else
              TIMESTAMP_TAG="${BASE_VER}"
            fi
          else
            # Registry not reachable or image doesn't exist yet (first build)
            TIMESTAMP_TAG="${BASE_VER}"
          fi

          echo "TIMESTAMP_TAG=${TIMESTAMP_TAG}" >> $GITHUB_ENV

      - name: Get current date
        id: date
        run: echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      - name: Image Metadata
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        id: metadata
        with:
          tags: |
            type=raw,value=testing
            type=raw,value=${{ env.TIMESTAMP_TAG }}
            type=sha,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=pr
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ matrix.image_desc }}
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/blob/${{ github.sha }}/Containerfile
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/tree/${{ github.sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ env.TIMESTAMP_TAG }}
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=${{ env.IMAGE_KEYWORDS }}
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.logo-url=${{ env.IMAGE_LOGO_URL }}
            io.artifacthub.package.prerelease=true
            containers.bootc=1
          sep-tags: " "
          sep-annotations: " "

      - name: Build Image
        id: build_image
        uses: redhat-actions/buildah-build@43f07bd7ede3b36f1f396e6fe54b277ac1b7e5e0 # v2
        with:
          containerfiles: |
            ./${{ matrix.containerfile }}
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ env.DEFAULT_TAG }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            BASE_IMAGE_NAME=${{ matrix.base_image_name }}
            IMAGE_FLAVOR=${{ matrix.image_flavor }}
            FEDORA_MAJOR_VERSION=${{ env.FEDORA_MAJOR_VERSION }}
            BASE_IMAGE_DIGEST=${{ env.BASE_IMAGE_DIGEST }}
            COMMON_IMAGE_DIGEST=${{ env.COMMON_IMAGE_DIGEST }}
            BREW_IMAGE_DIGEST=${{ env.BREW_IMAGE_DIGEST }}
            AKMODS_TAG=${{ env.AKMODS_TAG }}
            AKMODS_DIGEST=${{ env.AKMODS_DIGEST }}
            AKMODS_NVIDIA_TAG=${{ env.AKMODS_NVIDIA_TAG }}
            AKMODS_NVIDIA_DIGEST=${{ env.AKMODS_NVIDIA_DIGEST }}
          oci: false

      - name: Rechunk Image
        run: |
          # Pre-pull the rechunking tool image with retry to handle transient registry failures
          RECHUNK_IMAGE="quay.io/centos-bootc/centos-bootc:stream10"
          for attempt in 1 2 3; do
            if sudo podman pull "${RECHUNK_IMAGE}"; then
              break
            fi
            echo "Pull failed (attempt ${attempt}/3)"
            if [ "${attempt}" -eq 3 ]; then
              echo "All pull attempts failed, giving up"
              exit 1
            fi
            echo "Retrying in 30s..."
            sleep 30
          done

          # Copy image from user storage to rootful podman
          podman save "localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}" | sudo podman load

          # Rechunk using bootc-base-imagectl with temporary tag strategy
          sudo podman run --rm --privileged \
            -v /var/lib/containers:/var/lib/containers \
            --entrypoint /usr/libexec/bootc-base-imagectl \
            quay.io/centos-bootc/centos-bootc:stream10 \
            rechunk --max-layers 67 \
            "localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}" \
            "localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}-rechunked"

          # Replace original tag with rechunked image
          sudo podman tag \
            "localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}-rechunked" \
            "localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}"
          sudo podman rmi "localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}-rechunked"

          # Sync rechunked image back to user storage for subsequent steps
          sudo podman save "localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}" | podman load
          sudo podman rmi "localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}"

      - name: Tag for registry
        run: |
          for tag in ${{ steps.metadata.outputs.tags }}; do
            podman tag ${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }} ${{ env.IMAGE_NAME }}:${tag}
          done

      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push To GHCR
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        id: push
        env:
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ github.token }}
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.metadata.outputs.tags }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ env.REGISTRY_PASSWORD }}

      # Image Signing with Cosign
      # Required: all images at ghcr.io/lbssousa must be signed because the image
      # configures /etc/containers/policy.json to require sigstoreSigned verification
      # for that registry namespace.

      - name: Install Cosign
        uses: sigstore/cosign-installer@d7543c93d881b35a8faa02e8e3605f69b7a1ce62 # v3.10.0
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)

      - name: Sign container image
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          IMAGE_FULL="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}"
          for tag in ${{ steps.metadata.outputs.tags }}; do
            cosign sign -y --key env://COSIGN_PRIVATE_KEY --tlog-upload=false $IMAGE_FULL:${tag}
          done
        env:
          TAGS: ${{ steps.push.outputs.digest }}
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
