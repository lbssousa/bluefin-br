---
# Builds the "next" image stream (previously known as "beta").
#
# Tag scheme (mirrors Bluefin, see https://docs.projectbluefin.io/blog/unifying-bluefin/):
#   next                - weekly build from the next Fedora release (pre-release / rawhide)
#   next.YYYYMMDD
#
# Requires "silverblue-main-next" in image-versions.yml pointing to the next Fedora base image.
#
# Image variants built per stream:
#   bluefin-br              - base image (Silverblue + BR customisations)
#   bluefin-br-dx           - developer experience variant
#   bluefin-br-nvidia       - NVIDIA proprietary drivers variant
#   bluefin-br-dx-nvidia    - DX + NVIDIA proprietary drivers variant
#   bluefin-br-nvidia-open  - NVIDIA open drivers variant
#   bluefin-br-dx-nvidia-open - DX + NVIDIA open drivers variant
#
name: Build next image
on:
  schedule:
    - cron: '50 5 * * SUN'   # 05:50 UTC every Sunday (same cadence as Bluefin beta)
  workflow_dispatch:

env:
  IMAGE_KEYWORDS: "bootc,ublue,universal-blue,bluefin,brasil,pt-br,next"
  IMAGE_LOGO_URL: "https://avatars.githubusercontent.com/u/120078124?s=200&v=4"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  BASE_IMAGE_NAME_ROOT: "${{ github.event.repository.name }}"
  DEFAULT_TAG: "next"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-${{ matrix.image_flavor }}-${{ matrix.base_image_name }}
  cancel-in-progress: true

jobs:
  build_push:
    name: Build and push image (${{ matrix.image_name_suffix != '' && matrix.image_name_suffix || 'base' }})
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image_flavor: main
            base_image_name: silverblue
            image_versions_key: silverblue-main-next
            image_name_suffix: ""
            image_desc: "Bluefin para o Brasil (next)"
          - image_flavor: dx
            base_image_name: silverblue
            image_versions_key: silverblue-main-next
            image_name_suffix: "-dx"
            image_desc: "Bluefin para o Brasil (developer experience, next)"
          - image_flavor: main
            base_image_name: silverblue-nvidia
            image_versions_key: silverblue-nvidia-main-next
            image_name_suffix: "-nvidia"
            image_desc: "Bluefin para o Brasil (NVIDIA proprietário, next)"
          - image_flavor: dx
            base_image_name: silverblue-nvidia
            image_versions_key: silverblue-nvidia-main-next
            image_name_suffix: "-dx-nvidia"
            image_desc: "Bluefin para o Brasil (developer experience + NVIDIA proprietário, next)"
          - image_flavor: main
            base_image_name: silverblue-nvidia-open
            image_versions_key: silverblue-nvidia-open-main-next
            image_name_suffix: "-nvidia-open"
            image_desc: "Bluefin para o Brasil (NVIDIA, next)"
          - image_flavor: dx
            base_image_name: silverblue-nvidia-open
            image_versions_key: silverblue-nvidia-open-main-next
            image_name_suffix: "-dx-nvidia-open"
            image_desc: "Bluefin para o Brasil (developer experience + NVIDIA, next)"

    steps:
      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${BASE_IMAGE_NAME_ROOT,,}${{ matrix.image_name_suffix }}" >> ${GITHUB_ENV}

      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5

      - name: Mount BTRFS for podman storage
        id: container-storage-action
        uses: ublue-os/container-storage-action@911baca08baf30c8654933e9e9723cb399892140 # main
        continue-on-error: true
        with:
          target-dir: /var/lib/containers
          mount-opts: compress-force=zstd:2

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Read image versions
        run: |
          BASE_IMAGE_DIGEST=$(yq -r '.images[] | select(.name == "${{ matrix.image_versions_key }}") | .digest' image-versions.yml)
          COMMON_IMAGE_DIGEST=$(yq -r '.images[] | select(.name == "common") | .digest' image-versions.yml)
          BREW_IMAGE_DIGEST=$(yq -r '.images[] | select(.name == "brew") | .digest' image-versions.yml)
          FEDORA_MAJOR_VERSION=$(yq -r '.images[] | select(.name == "${{ matrix.image_versions_key }}") | .tag' image-versions.yml)
          echo "BASE_IMAGE_DIGEST=${BASE_IMAGE_DIGEST}" >> $GITHUB_ENV
          echo "COMMON_IMAGE_DIGEST=${COMMON_IMAGE_DIGEST}" >> $GITHUB_ENV
          echo "BREW_IMAGE_DIGEST=${BREW_IMAGE_DIGEST}" >> $GITHUB_ENV
          echo "FEDORA_MAJOR_VERSION=${FEDORA_MAJOR_VERSION}" >> $GITHUB_ENV

      - name: Get current date
        id: date
        run: echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      - name: Image Metadata
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f # v5
        id: metadata
        with:
          tags: |
            type=raw,value=next
            type=raw,value=next.{{date 'YYYYMMDD'}}
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ matrix.image_desc }}
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/blob/${{ github.sha }}/Containerfile
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/tree/${{ github.sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=next.{{date 'YYYYMMDD'}}
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=${{ env.IMAGE_KEYWORDS }}
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.logo-url=${{ env.IMAGE_LOGO_URL }}
            io.artifacthub.package.prerelease=true
            containers.bootc=1
          sep-tags: " "
          sep-annotations: " "

      - name: Build Image
        id: build_image
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2
        with:
          containerfiles: |
            ./Containerfile
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ env.DEFAULT_TAG }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            BASE_IMAGE_NAME=${{ matrix.base_image_name }}
            IMAGE_FLAVOR=${{ matrix.image_flavor }}
            FEDORA_MAJOR_VERSION=${{ env.FEDORA_MAJOR_VERSION }}
            BASE_IMAGE_DIGEST=${{ env.BASE_IMAGE_DIGEST }}
            COMMON_IMAGE_DIGEST=${{ env.COMMON_IMAGE_DIGEST }}
            BREW_IMAGE_DIGEST=${{ env.BREW_IMAGE_DIGEST }}
          oci: false

      - name: Tag for registry
        run: |
          for tag in ${{ steps.metadata.outputs.tags }}; do
            podman tag ${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }} ${{ env.IMAGE_NAME }}:${tag}
          done

      - name: Login to GitHub Container Registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push To GHCR
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2
        id: push
        env:
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ github.token }}
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.metadata.outputs.tags }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ env.REGISTRY_PASSWORD }}

      # OPTIONAL: Image Signing with Cosign
      # Signing is disabled by default. To enable, see README.md "Optional: Enable Image Signing" section.

      # - name: Install Cosign
      #   uses: sigstore/cosign-installer@d7543c93d881b35a8faa02e8e3605f69b7a1ce62 # v3.10.0
      #
      # - name: Sign container image
      #   run: |
      #     IMAGE_FULL="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}"
      #     for tag in ${{ steps.metadata.outputs.tags }}; do
      #       cosign sign -y --key env://COSIGN_PRIVATE_KEY $IMAGE_FULL:${tag}
      #     done
      #   env:
      #     TAGS: ${{ steps.push.outputs.digest }}
      #     COSIGN_EXPERIMENTAL: false
      #     COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
