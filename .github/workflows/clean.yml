name: Cleanup Old Images
on:
  schedule:
    - cron: "0 0 * * 0" # Weekly on Sunday at midnight UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}

jobs:
  delete-older-than-90:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete Images Older Than 90 Days
        uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4 # v1.0.16
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          packages: >-
            bluefin-br,
            bluefin-br-dx,
            bluefin-br-nvidia,
            bluefin-br-dx-nvidia,
            bluefin-br-nvidia-open,
            bluefin-br-dx-nvidia-open
          older-than: 90 days
          delete-orphaned-images: true
          # Keep the last 7 tagged images per stream:
          #   stable, stable-daily, gts, latest, beta  (+ datestamped variants)
          keep-n-tagged: 35
          keep-n-untagged: 7
