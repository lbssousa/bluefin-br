---
name: Check Epson Package Updates
on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check_updates:
    name: Check for Epson package updates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check epson-inkjet-printer-escpr update
        id: check_escpr
        run: |
          set -euo pipefail

          # Epson LSB distribution page for ESC/P-R source RPM.
          # This page lists the current driver version and download links.
          LSB_PAGE_URL="https://support.epson.net/linux/Printer/LSB_distribution_pages/en/escpr.php"

          # Fetch the page. A browser-like User-Agent avoids potential blocks.
          PAGE_HTML=$(curl --silent --location --max-redirs 5 \
            --user-agent "Mozilla/5.0 (X11; Linux x86_64; rv:137.0) Gecko/20100101 Firefox/137.0" \
            --connect-timeout 15 \
            --max-time 60 \
            "${LSB_PAGE_URL}" 2>/dev/null) || true

          if [ -z "${PAGE_HTML}" ]; then
            echo "::warning::Could not fetch Epson ESC/P-R LSB page - skipping update check"
            echo "new_url=" >> "${GITHUB_OUTPUT}"
            echo "new_version=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # Look for a download link containing the source RPM filename.
          # The page may use download-center.epson.com or download*.ebz.epson.net URLs.
          DOWNLOAD_URL=$(echo "${PAGE_HTML}" \
            | grep -oP 'https?://[^"\x27<>\s]+epson-inkjet-printer-escpr-[0-9][^"\x27<>\s]*\.src\.rpm' \
            | head -1) || true

          if [ -z "${DOWNLOAD_URL}" ]; then
            echo "::warning::Could not find ESC/P-R source RPM download link on the Epson LSB page - skipping"
            echo "new_url=" >> "${GITHUB_OUTPUT}"
            echo "new_version=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          FILENAME=$(basename "${DOWNLOAD_URL}")
          NEW_VERSION=$(echo "${FILENAME}" | grep -oP '\d+\.\d+\.\d+' | head -1)
          if [ -z "${NEW_VERSION}" ]; then
            echo "Could not extract version from filename: ${FILENAME}"
            echo "new_url=" >> "${GITHUB_OUTPUT}"
            echo "new_version=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          CURRENT_VERSION=$(grep 'ESCPR_VERSION=' build/20-epson-printer.sh | head -1 | grep -oP '\d+\.\d+\.\d+')
          echo "Current escpr version: ${CURRENT_VERSION}"
          echo "Available escpr version: ${NEW_VERSION}"

          if [ "${NEW_VERSION}" != "${CURRENT_VERSION}" ]; then
            echo "new_url=${DOWNLOAD_URL}" >> "${GITHUB_OUTPUT}"
            echo "new_version=${NEW_VERSION}" >> "${GITHUB_OUTPUT}"
          else
            echo "escpr is up to date (${CURRENT_VERSION})"
            echo "new_url=" >> "${GITHUB_OUTPUT}"
            echo "new_version=" >> "${GITHUB_OUTPUT}"
          fi

      - name: Check epson-printer-utility update
        id: check_utility
        run: |
          set -euo pipefail

          # Epson LSB distribution page for the printer utility RPM.
          LSB_PAGE_URL="https://support.epson.net/linux/Printer/LSB_distribution_pages/en/utility.php"

          # Fetch the page. A browser-like User-Agent avoids potential blocks.
          PAGE_HTML=$(curl --silent --location --max-redirs 5 \
            --user-agent "Mozilla/5.0 (X11; Linux x86_64; rv:137.0) Gecko/20100101 Firefox/137.0" \
            --connect-timeout 15 \
            --max-time 60 \
            "${LSB_PAGE_URL}" 2>/dev/null) || true

          if [ -z "${PAGE_HTML}" ]; then
            echo "::warning::Could not fetch Epson printer-utility LSB page - skipping update check"
            echo "new_url=" >> "${GITHUB_OUTPUT}"
            echo "new_version=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # Look for a download link containing the x86_64 RPM filename.
          DOWNLOAD_URL=$(echo "${PAGE_HTML}" \
            | grep -oP 'https?://[^"\x27<>\s]+epson-printer-utility-[0-9][^"\x27<>\s]*\.x86_64\.rpm' \
            | head -1) || true

          if [ -z "${DOWNLOAD_URL}" ]; then
            echo "::warning::Could not find printer-utility RPM download link on the Epson LSB page - skipping"
            echo "new_url=" >> "${GITHUB_OUTPUT}"
            echo "new_version=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          FILENAME=$(basename "${DOWNLOAD_URL}")
          NEW_VERSION=$(echo "${FILENAME}" | grep -oP '\d+\.\d+\.\d+' | head -1)
          if [ -z "${NEW_VERSION}" ]; then
            echo "Could not extract version from filename: ${FILENAME}"
            echo "new_url=" >> "${GITHUB_OUTPUT}"
            echo "new_version=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          CURRENT_VERSION=$(grep 'UTILITY_VERSION=' build/20-epson-printer.sh | head -1 | grep -oP '\d+\.\d+\.\d+')
          echo "Current utility version: ${CURRENT_VERSION}"
          echo "Available utility version: ${NEW_VERSION}"

          if [ "${NEW_VERSION}" != "${CURRENT_VERSION}" ]; then
            echo "new_url=${DOWNLOAD_URL}" >> "${GITHUB_OUTPUT}"
            echo "new_version=${NEW_VERSION}" >> "${GITHUB_OUTPUT}"
          else
            echo "printer-utility is up to date (${CURRENT_VERSION})"
            echo "new_url=" >> "${GITHUB_OUTPUT}"
            echo "new_version=" >> "${GITHUB_OUTPUT}"
          fi

      - name: Update build script with new versions
        id: update_script
        if: steps.check_escpr.outputs.new_version != '' || steps.check_utility.outputs.new_version != ''
        run: |
          set -euo pipefail

          CHANGED=false

          # Update escpr if a new version was found
          if [ -n "${{ steps.check_escpr.outputs.new_version }}" ]; then
            NEW_VERSION="${{ steps.check_escpr.outputs.new_version }}"
            NEW_URL="${{ steps.check_escpr.outputs.new_url }}"

            sed -i \
              "s|ESCPR_VERSION=\"[0-9.]*\"|ESCPR_VERSION=\"${NEW_VERSION}\"|g" \
              build/20-epson-printer.sh
            sed -i \
              "s|ESCPR_SRPM_URL=.*|ESCPR_SRPM_URL=\"${NEW_URL}\"|g" \
              build/20-epson-printer.sh

            echo "Updated escpr to ${NEW_VERSION}"
            CHANGED=true
          fi

          # Update printer-utility if a new version was found
          if [ -n "${{ steps.check_utility.outputs.new_version }}" ]; then
            NEW_VERSION="${{ steps.check_utility.outputs.new_version }}"
            NEW_URL="${{ steps.check_utility.outputs.new_url }}"

            sed -i \
              "s|UTILITY_VERSION=\"[0-9.]*\"|UTILITY_VERSION=\"${NEW_VERSION}\"|g" \
              build/20-epson-printer.sh
            sed -i \
              "s|UTILITY_RPM_URL=.*|UTILITY_RPM_URL=\"${NEW_URL}\"|g" \
              build/20-epson-printer.sh

            echo "Updated printer-utility to ${NEW_VERSION}"
            CHANGED=true
          fi

          echo "changed=${CHANGED}" >> "${GITHUB_OUTPUT}"

      - name: Build PR body
        id: pr_body
        if: steps.update_script.outputs.changed == 'true'
        run: |
          set -euo pipefail

          BODY="## Epson Package Updates\n\n"
          BODY+="Automated update of Epson printer software packages.\n\n"

          if [ -n "${{ steps.check_escpr.outputs.new_version }}" ]; then
            BODY+="### epson-inkjet-printer-escpr\n"
            BODY+="- **New version**: \`${{ steps.check_escpr.outputs.new_version }}\`\n"
            BODY+="- **Download URL**: ${{ steps.check_escpr.outputs.new_url }}\n\n"
          fi

          if [ -n "${{ steps.check_utility.outputs.new_version }}" ]; then
            BODY+="### epson-printer-utility\n"
            BODY+="- **New version**: \`${{ steps.check_utility.outputs.new_version }}\`\n"
            BODY+="- **Download URL**: ${{ steps.check_utility.outputs.new_url }}\n\n"
          fi

          BODY+="Please review and merge to rebuild the image with the updated Epson packages.\n"

          # Use printf to properly handle newlines in the multiline string
          {
            echo "body<<EOF"
            printf '%b' "${BODY}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Create Pull Request
        if: steps.update_script.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: update Epson printer package versions"
          title: "fix: update Epson printer software packages"
          body: ${{ steps.pr_body.outputs.body }}
          # Fixed branch name intentionally: create-pull-request updates the
          # existing PR on re-runs rather than opening a duplicate PR.
          branch: "renovate/epson-printer-updates"
          labels: "renovate"
          delete-branch: true
